version: "3.7"

services:
  db:
    container_name: postgres
    image: postgres:16.13-alpine
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - backend

  redis:
    container_name: redis
    image: redis:7.4.8
    restart: always
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend

  redis-insight:
    container_name: redis-insight
    image: redis/redisinsight:3.2
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis-insight_data:/dat
    networks:
      - backend
    depends_on:
    - redis

volumes:
  postgres_data:
  redis_data:
  redis-insight_data:

networks:
  backend:
